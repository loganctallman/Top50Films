name: QA Agent — Failure Analysis

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  analyze:
    name: Analyze CI Failures
    # Only run when the CI workflow actually failed
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest

    permissions:
      actions: read   # fetch job logs
      issues: write   # create the report issue
      contents: read  # checkout repo to read test files

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run QA agent — failure analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: node .github/scripts/qa-agent.js failures
