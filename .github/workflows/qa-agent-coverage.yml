name: QA Agent — Coverage Review

on:
  pull_request:
    types: [opened, synchronize]
    # Only run when source or test files change — skip docs-only PRs
    paths:
      - 'src/**'
      - 'api/**'
      - 'tests/**'

jobs:
  review:
    name: Review Test Coverage Gaps
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write  # post the coverage report comment
      contents: read        # checkout repo to read test files

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run QA agent — coverage review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.number }}
        run: node .github/scripts/qa-agent.js coverage
