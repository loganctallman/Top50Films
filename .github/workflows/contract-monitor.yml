name: API Contract Monitor

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  contract-monitor:
    name: TMDB Upstream Contract Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run contract monitor
        id: monitor
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node .github/scripts/contract-monitor.js
        continue-on-error: true

      - name: Open GitHub Issue on failure
        if: steps.monitor.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            let body = '## TMDB API Contract Violation\n\nThe weekly upstream contract monitor detected one or more schema violations.\n\n'
            try {
              body += '```\n' + fs.readFileSync('contract-failures.txt', 'utf8') + '\n```\n'
            } catch {
              body += '_contract-failures.txt not found — check the workflow logs for details._\n'
            }
            body += `\n**Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'contract-violation'
            })

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 TMDB API contract violation detected',
                body,
                labels: ['contract-violation', 'automated']
              })
            }

      - name: Upload failure report
        if: steps.monitor.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: contract-failures
          path: contract-failures.txt
          retention-days: 30

      - name: Fail job after issue creation
        if: steps.monitor.outcome == 'failure'
        run: exit 1
