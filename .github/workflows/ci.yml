name: CI

on:
  push:
    branches: [main, Dev]
  pull_request:
    branches: [main]

# Key on the source branch name so push and PR events for the same branch
# land in the same concurrency group and cancel each other.
concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Unit + component tests (Vitest)
  # -------------------------------------------------------------------------
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # -------------------------------------------------------------------------
  # Job 2: E2E tests (Playwright — Chromium only)
  # The playwright webServer config handles build + vite preview automatically
  # when CI=true (reuseExistingServer is false in CI).
  # -------------------------------------------------------------------------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache Playwright browser binaries between runs
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright + system deps
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached browsers)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # -------------------------------------------------------------------------
  # Job 3: Deploy to Vercel (production) — only on main, only if tests pass
  # -------------------------------------------------------------------------
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [unit, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # -------------------------------------------------------------------------
  # Job 4: Postman smoke tests — runs against live production after deploy
  # -------------------------------------------------------------------------
  smoke:
    name: Smoke Tests (Live)
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - name: Install Newman
        run: npm install --global newman

      - name: Run MyTop50 Smoke Test Live
        run: |
          newman run "https://api.getpostman.com/collections/53659455-4f371e19-b97f-4789-a6dd-860d8cb056c8?apikey=${{ secrets.POSTMAN_API_KEY }}" \
            --env-var "baseUrl=https://top50films.vercel.app" \
            --reporters cli,junit \
            --reporter-junit-export newman-results.xml

      - name: Upload Newman results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-results
          path: newman-results.xml
          retention-days: 7
